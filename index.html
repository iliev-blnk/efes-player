<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFFF00">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Sabbath Player&quot;,&quot;short_name&quot;:&quot;Sabbath&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#222&quot;,&quot;theme_color&quot;:&quot;#FFFF00&quot;}">
<title>04 JUL. SABBATH PROGRAM — PLAYER</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFFF00;
    --black: #000000;
    --white: #FFFFFF;
    --dark: #222;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--dark);
    font-family: 'Space Mono', 'Courier New', monospace;
    color: var(--black);
    display: flex;
    justify-content: center;
    padding: 20px;
    text-transform: uppercase;
    -webkit-font-smoothing: antialiased;
    font-weight: 700;
  }
  .card {
    background: var(--yellow);
    width: 100%;
    max-width: 1100px;
    border-radius: 18px;
    padding: 40px 48px 48px;
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 40px);
  }
  /* header */
  .hdr {
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 5px solid var(--black);
    padding-bottom: 14px;
    margin-bottom: 24px;
  }
  .hdr .num { font-size: 56px; letter-spacing: -2px; }
  .hdr .ttl { font-size: 24px; letter-spacing: 1px; flex: 1; }
  /* main grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    flex: 1;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .hdr { flex-wrap: wrap; }
  }
  /* left: cover + player */
  .left { display: flex; flex-direction: column; }
  .cover {
    border: 6px solid var(--black);
    background: var(--white);
    padding: 12px;
    margin-bottom: 24px;
  }
  .cover img {
    width: 100%;
    display: block;
    aspect-ratio: 1;
  }
  .nowwrap {
    margin-bottom: 20px;
  }
  .nplabel {
    font-size: 13px;
    letter-spacing: 2px;
  }
  .nptitle {
    display: inline-block;
    background: var(--white);
    padding: 6px 12px;
    font-size: 22px;
    margin-top: 8px;
    min-height: 1.4em;
    word-break: break-word;
  }
  .npslot {
    font-size: 13px;
    margin-top: 8px;
  }
  /* seek */
  .seekrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    font-size: 13px;
  }
  .seek {
    flex: 1;
    height: 14px;
    background: var(--white);
    border: 3px solid var(--black);
    cursor: pointer;
    position: relative;
  }
  .seek .fill {
    height: 100%;
    width: 0%;
    background: var(--black);
  }
  /* controls */
  .controls {
    display: flex;
    gap: 10px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    font-weight: 700;
    text-transform: uppercase;
    background: var(--black);
    color: var(--yellow);
    border: 3px solid var(--black);
    padding: 12px 18px;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  button:active { transform: translate(2px, 2px); }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  button.toggle {
    background: var(--yellow);
    color: var(--black);
  }
  button.toggle.on {
    background: var(--white);
    color: var(--black);
  }
  /* volume */
  .volwrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .vol {
    flex: 1;
    height: 10px;
    background: var(--white);
    border: 3px solid var(--black);
    cursor: pointer;
    position: relative;
    -webkit-appearance: none;
    appearance: none;
  }
  .vol::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: var(--black);
    border: none;
    cursor: pointer;
  }
  .vol::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: var(--black);
    border: none;
    cursor: pointer;
  }
  .vollbl { font-size: 13px; min-width: 50px; }
  /* file input */
  #fileInput { display: none; }
  #trackFileInput { display: none; }
  .load-btn { margin-bottom: 20px; }
  /* right: playlist + program */
  .right { display: flex; flex-direction: column; }
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 16px;
    letter-spacing: 2px;
    border-bottom: 4px solid var(--black);
    padding-bottom: 10px;
    margin-bottom: 14px;
  }
  /* playlist */
  .playlist {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .playlist-item {
    display: grid;
    grid-template-columns: 30px 1fr 120px;
    gap: 12px;
    padding: 8px 10px;
    cursor: pointer;
    opacity: 1;
    transition: opacity 0.2s;
    font-size: 13px;
  }
  .playlist-item.unloaded {
    opacity: 0.38;
    cursor: default;
  }
  .playlist-item.active {
    background: var(--white);
  }
  .playlist-item-num { text-align: center; }
  .playlist-item-title { word-break: break-word; }
  .playlist-item-slot { text-align: right; }
  /* program */
  .program {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
  }
  .prog-item {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 12px;
    padding: 8px 10px;
  }
  .prog-item.music {
    background: var(--white);
  }
  .prog-time { font-weight: 700; }
  .prog-text { word-break: break-word; }
  /* footer */
  .footer {
    border-top: 5px solid var(--black);
    padding-top: 14px;
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .footer-left { }
  .footer-right { }
  /* drag-drop overlay */
  .dropzone {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    border: 6px dashed var(--white);
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--white);
    z-index: 9999;
    pointer-events: none;
  }
  .dropzone.active {
    display: flex;
    pointer-events: auto;
  }
  @media (max-width: 900px) {
    .card { padding: 24px 20px 32px; }
    .hdr { margin-bottom: 16px; }
    .hdr .num { font-size: 42px; }
    .hdr .ttl { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="hdr">
    <div class="num">04</div>
    <div class="ttl">JUL. SABBATH PROGRAM — MUSIC PLAYER</div>
  </div>

  <div class="grid">
    <!-- LEFT: COVER + PLAYER -->
    <div class="left">
      <div class="cover">
        <img id="coverImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Crect fill='%23ccc' width='300' height='300'/%3E%3Ctext x='150' y='150' font-size='24' text-anchor='middle' dominant-baseline='middle' fill='%23666'%3EPHESUS%3C/text%3E%3C/svg%3E" alt="Ephesus - Ancient Engraving">
      </div>

      <div class="nowwrap">
        <div class="nplabel">NOW PLAYING</div>
        <div class="nptitle" id="npTitle">—</div>
        <div class="npslot" id="npSlot">FOR: —</div>
      </div>

      <div class="seekrow">
        <div class="seek"><div class="fill" id="seekFill"></div></div>
        <div id="timeDisplay">00:00 / 00:00</div>
      </div>

      <div class="controls">
        <button id="prevBtn">⏮ PREV</button>
        <button id="playBtn">▶ PLAY</button>
        <button id="nextBtn">NEXT ⏭</button>
        <button id="fadeBtn" class="toggle">FADE: OFF</button>
      </div>

      <div class="volwrap">
        <div class="vollbl">VOL</div>
        <input type="range" id="volSlider" class="vol" min="0" max="100" value="70">
      </div>

      <button id="loadBtn" class="load-btn">+ LOAD AUDIO FILES</button>
    </div>

    <!-- RIGHT: PLAYLIST + PROGRAM -->
    <div class="right">
      <div class="section">
        <div class="section-title">PLAYLIST (8 TRACKS)</div>
        <div class="playlist" id="playlist"></div>
      </div>

      <div class="section">
        <div class="section-title">PROGRAM SCHEDULE</div>
        <div class="program" id="program"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left">SABBATH PROGRAM PLAYER</div>
    <div class="footer-right">05 JUL. EPHESUS'26</div>
  </div>
</div>

<div class="dropzone" id="dropzone">DROP AUDIO FILES</div>

<audio id="audio" crossorigin="anonymous"></audio>
<input type="file" id="fileInput" multiple accept="audio/*">
<input type="file" id="trackFileInput" accept="audio/*">

<script>
const TRACKS = [
  {title:"AMAZING GRACE",             slot:"OPENING - 13:00"},
  {title:"BLESSED ASSURANCE",         slot:"HYMN (NO:1) - 15:00"},
  {title:"AS WE GATHER",              slot:"OFFERINGS - 15:05"},
  {title:"JESUS LOVES ME",            slot:"CHILDREN STORY - 15:20"},
  {title:"HOW GREAT THOU ART",        slot:"HYMN (NO:2) - 15:30"},
  {title:"IT IS WELL",                slot:"HYMN (NO:3) - 16:10"},
  {title:"GREAT IS THY FAITHFULNESS", slot:"HYMN (NO:4) - 16:30"},
  {title:"GOD BE WITH YOU",           slot:"CLOSING HYMN - 16:50"},
];

const PROGRAM = [
  ["13:00","WELCOME - PRAYER - HYMN",false],
  ["13:15","SABBATH SCHOOL",false],
  ["14:15","BREAK 15 MINUTES",false],
  ["14:30","WELCOME - PRAYER - HYMN",false],
  ["14:45","NAME TAG - INTRODUCE OURSELVES",false],
  ["15:00","HYMN (NO:1)",true],
  ["15:05","OFFERINGS",true],
  ["15:20","CHILDREN STORY",true],
  ["15:30","HYMN (NO:2)",true],
  ["15:40","SPEAKER 1 - PAST",false],
  ["15:50","SPEAKER 2 - PRESENT",false],
  ["16:00","SPEAKER 3 - FUTURE",false],
  ["16:10","HYMN (NO:3)",true],
  ["16:20","GIFTS TIME",false],
  ["16:30","HYMN (NO:4)",true],
  ["16:40","PRAYER - THANKS",false],
  ["16:50","HYMN",true],
  ["17:00","LUNCH TOGETHER",false],
];

// State
const state = {
  currentTrackIndex: 0,
  isPlaying: false,
  fadeEnabled: localStorage.getItem('fadeEnabled') === 'true',
  isFading: false,
  trackUrls: [],
};

const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const fadeBtn = document.getElementById('fadeBtn');
const volSlider = document.getElementById('volSlider');
const loadBtn = document.getElementById('loadBtn');
const fileInput = document.getElementById('fileInput');
const trackFileInput = document.getElementById('trackFileInput');
const playlist = document.getElementById('playlist');
const program = document.getElementById('program');
const seekEl = document.querySelector('.seek');
const seekFill = document.getElementById('seekFill');
const timeDisplay = document.getElementById('timeDisplay');
const npTitle = document.getElementById('npTitle');
const npSlot = document.getElementById('npSlot');
const dropzone = document.getElementById('dropzone');

// Render playlist
function renderPlaylist() {
  playlist.innerHTML = TRACKS.map((t, i) => {
    const hasAudio = i < state.trackUrls.length && state.trackUrls[i];
    const isActive = state.currentTrackIndex === i;
    return `
      <div class="playlist-item ${!hasAudio ? 'unloaded' : ''} ${isActive ? 'active' : ''}"
           data-index="${i}"
           onclick="playlistClick(${i})"
           ondblclick="${!hasAudio ? `loadTrackAudio(${i})` : ''}">
        <div class="playlist-item-num">${i+1}</div>
        <div class="playlist-item-title">${t.title}</div>
        <div class="playlist-item-slot">${t.slot.split(' - ')[0]}</div>
      </div>
    `;
  }).join('');
}

// Render program
function renderProgram() {
  program.innerHTML = PROGRAM.map(([time, text, isMusic]) => `
    <div class="prog-item ${isMusic ? 'music' : ''}">
      <div class="prog-time">${time}</div>
      <div class="prog-text">${text}</div>
    </div>
  `).join('');
}

// Update now playing
function updateNowPlaying() {
  if (state.currentTrackIndex < TRACKS.length && state.trackUrls[state.currentTrackIndex]) {
    npTitle.textContent = TRACKS[state.currentTrackIndex].title;
    npSlot.textContent = 'FOR: ' + TRACKS[state.currentTrackIndex].slot;
  } else {
    npTitle.textContent = '—';
    npSlot.textContent = 'FOR: —';
  }
  renderPlaylist();
}

// Format time
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Update tab title with play state
function updateTabTitle() {
  const prefix = state.isPlaying ? '▶ ' : '⏸ ';
  const title = state.currentTrackIndex < TRACKS.length ? TRACKS[state.currentTrackIndex].title : 'PLAYER';
  document.title = prefix + title;
}

// Load audio file
async function loadAudioFile(url, trackIndex) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      state.trackUrls[trackIndex] = e.target.result;
      updateNowPlaying();
      resolve();
    };
    reader.readAsArrayBuffer(url);
  });
}

// Load from file
async function handleFileLoad(files, startIndex = 0) {
  for (let i = 0; i < files.length && startIndex + i < TRACKS.length; i++) {
    const url = URL.createObjectURL(files[i]);
    await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = (e) => {
        state.trackUrls[startIndex + i] = e.target.result;
        updateNowPlaying();
        resolve();
      };
      reader.readAsDataURL(files[i]);
    });
  }
}

// Load button
loadBtn.addEventListener('click', () => {
  fileInput.click();
});

fileInput.addEventListener('change', async (e) => {
  await handleFileLoad(e.target.files, 0);
  fileInput.value = '';
});

// Per-track loading (double-click unloaded track)
function loadTrackAudio(index) {
  trackFileInput.dataset.targetIndex = index;
  trackFileInput.click();
}

trackFileInput.addEventListener('change', async (e) => {
  const index = parseInt(trackFileInput.dataset.targetIndex);
  if (e.target.files.length > 0) {
    await handleFileLoad(e.target.files, index);
  }
  trackFileInput.value = '';
});

// Fade logic
async function fade(fromVol, toVol, durationMs) {
  if (!state.fadeEnabled || durationMs === 0) {
    audio.volume = toVol / 100;
    return;
  }

  state.isFading = true;
  const steps = 60;
  const stepDur = durationMs / steps;
  const volDiff = toVol - fromVol;

  return new Promise(resolve => {
    let step = 0;
    const raf = () => {
      step++;
      const progress = Math.min(step / steps, 1);
      audio.volume = Math.max(0, Math.min(1, (fromVol + volDiff * progress) / 100));
      if (progress < 1) {
        setTimeout(raf, stepDur);
      } else {
        state.isFading = false;
        resolve();
      }
    };
    raf();
  });
}

// Play track
async function playTrack(index) {
  if (index < 0 || index >= TRACKS.length || !state.trackUrls[index]) return;

  const wasPlaying = state.isPlaying && audio.src;
  const oldVol = audio.volume * 100;

  state.currentTrackIndex = index;
  updateNowPlaying();

  if (wasPlaying) {
    await fade(oldVol, 0, state.fadeEnabled ? 900 : 0);
  }

  const blob = new Blob([state.trackUrls[index]], {type: 'audio/mpeg'});
  audio.src = URL.createObjectURL(blob);

  state.isPlaying = true;
  playBtn.textContent = '⏸ PAUSE';
  updateTabTitle();

  await audio.play().catch(() => {});
  await fade(0, parseInt(volSlider.value), state.fadeEnabled ? 900 : 0);
}

// Play/pause
playBtn.addEventListener('click', async () => {
  if (!state.trackUrls[state.currentTrackIndex]) {
    return;
  }

  if (state.isPlaying) {
    if (state.fadeEnabled) {
      await fade(parseInt(volSlider.value), 0, 500);
    }
    audio.pause();
    state.isPlaying = false;
    playBtn.textContent = '▶ PLAY';
  } else {
    if (audio.src) {
      if (state.fadeEnabled) {
        await fade(0, parseInt(volSlider.value), 500);
      }
      state.isPlaying = true;
      playBtn.textContent = '⏸ PAUSE';
      await audio.play().catch(() => {});
    } else {
      await playTrack(state.currentTrackIndex);
    }
  }
  updateTabTitle();
});

// Next
nextBtn.addEventListener('click', async () => {
  let nextIndex = state.currentTrackIndex + 1;
  while (nextIndex < TRACKS.length && !state.trackUrls[nextIndex]) nextIndex++;
  if (nextIndex < TRACKS.length) {
    await playTrack(nextIndex);
  }
});

// Prev
prevBtn.addEventListener('click', async () => {
  let prevIndex = state.currentTrackIndex - 1;
  while (prevIndex >= 0 && !state.trackUrls[prevIndex]) prevIndex--;
  if (prevIndex >= 0) {
    await playTrack(prevIndex);
  }
});

// Fade toggle
fadeBtn.addEventListener('click', () => {
  state.fadeEnabled = !state.fadeEnabled;
  localStorage.setItem('fadeEnabled', state.fadeEnabled);
  fadeBtn.textContent = `FADE: ${state.fadeEnabled ? 'ON' : 'OFF'}`;
  fadeBtn.classList.toggle('on', state.fadeEnabled);
});

// Volume
volSlider.addEventListener('input', (e) => {
  if (!state.isFading) {
    audio.volume = e.target.value / 100;
  }
  localStorage.setItem('volume', e.target.value);
});

// Load persisted volume
const savedVol = localStorage.getItem('volume');
if (savedVol) {
  volSlider.value = savedVol;
  audio.volume = savedVol / 100;
}

// Seek
seekEl.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = seekEl.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

// Time update
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  seekFill.style.width = pct + '%';
  timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration || 0);
});

// Auto-advance
audio.addEventListener('ended', async () => {
  let nextIndex = state.currentTrackIndex + 1;
  while (nextIndex < TRACKS.length && !state.trackUrls[nextIndex]) nextIndex++;
  if (nextIndex < TRACKS.length) {
    await playTrack(nextIndex);
  } else {
    state.isPlaying = false;
    playBtn.textContent = '▶ PLAY';
    updateTabTitle();
  }
});

// Playlist click
function playlistClick(index) {
  if (state.trackUrls[index]) {
    playTrack(index);
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); nextBtn.click(); }
  else if (e.code === 'ArrowLeft') { e.preventDefault(); prevBtn.click(); }
  else if (e.key.toLowerCase() === 'f') { e.preventDefault(); fadeBtn.click(); }
});

// Drag and drop
let dragCounter = 0;

document.addEventListener('dragenter', (e) => {
  dragCounter++;
  if (e.dataTransfer.types.includes('Files')) {
    dropzone.classList.add('active');
  }
});

document.addEventListener('dragleave', (e) => {
  dragCounter--;
  if (dragCounter === 0) {
    dropzone.classList.remove('active');
  }
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

document.addEventListener('drop', async (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropzone.classList.remove('active');

  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/'));
  if (files.length > 0) {
    await handleFileLoad(files, 0);
  }
});

// Set initial fade button state
fadeBtn.classList.toggle('on', state.fadeEnabled);
fadeBtn.textContent = `FADE: ${state.fadeEnabled ? 'ON' : 'OFF'}`;

// Render
renderPlaylist();
renderProgram();
updateNowPlaying();
</script>

</body>
</html>
